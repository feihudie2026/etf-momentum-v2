name: Run Momentum Strategy
on:
  schedule:
    - cron: '30 6 * * *'   # 每天北京时间 14:30
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install pandas numpy baostock requests beautifulsoup4 lxml akshare
      # 新闻抓取（使用国内免费API，无需API Key）
      - name: Fetch news interventions
        run: python news_fetcher.py
      # 北向资金抓取
      - name: Fetch north flow interventions
        run: python north_fetcher.py
      # ETF资金流抓取（AKShare）
      - name: Fetch ETF flow interventions
        run: python flow_fetcher.py
      # 大宗商品抓取
      - name: Fetch commodity interventions
        run: python commodity_fetcher.py
      # 运行核心动量策略
      - name: Run momentum script
        run: python momentum.py
      # 提交更新（如有变化）
      - name: Commit and push if changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/index.html docs/signals.csv events_config.json \
                news_interventions.json north_interventions.json \
                flow_interventions.json commodity_interventions.json intraday_alerts.json
          git diff --staged --quiet || (git commit -m 'Update signals and interventions' && git push)
