name: Run Momentum Strategy

on:
  schedule:
    - cron: '30 6 * * *'   # 每天北京时间 14:30
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ build-essential

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade akshare  # 确保 akshare 是最新版
          pip install pandas numpy baostock --no-cache-dir

      # ====================== 新增：调试 akshare 数据获取 ======================
      - name: Test akshare data fetch
        run: |
          python -c "
import akshare as ak
print('='*50)
print('测试黄金ETF 518880...')
try:
    df_gold = ak.fund_etf_hist_em(symbol='518880', period='daily', start_date='20260101', end_date='20260302')
    print(f'成功获取黄金数据，共 {len(df_gold)} 条')
    print('最近3条记录：')
    print(df_gold.tail(3))
except Exception as e:
    print('黄金数据获取失败:', e)

print('\\n测试原油基金 501018...')
try:
    df_oil = ak.fund_etf_hist_em(symbol='501018', period='daily', start_date='20260101', end_date='20260302')
    print(f'成功获取原油数据，共 {len(df_oil)} 条')
    print('最近3条记录：')
    print(df_oil.tail(3))
except Exception as e:
    print('原油数据获取失败:', e)
print('='*50)
          "

      - name: List files for debugging
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in root:"
          ls -la
          echo "Files in docs (if exists):"
          ls -la docs || echo "docs folder not found"

      - name: Run momentum script
        run: python momentum.py

      - name: Commit and push if changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/index.html docs/signals.csv events_config.json || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Update signal and events"
          git push
