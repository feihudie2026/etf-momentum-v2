name: Run Momentum Strategy

on:
  schedule:
    - cron: '30 6 * * *'   # 每天北京时间 14:30
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ build-essential

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade akshare
          pip install pandas numpy baostock --no-cache-dir

      # 调试黄金ETF
      - name: Test gold data
        run: |
          python -c "
import akshare as ak
df = ak.fund_etf_hist_em(symbol='518880', period='daily', start_date='20260101', end_date='20260302')
print('黄金数据条数:', len(df))
print(df.tail(3))
"

      # 调试原油基金
      - name: Test oil data
        run: |
          python -c "
import akshare as ak
df = ak.fund_etf_hist_em(symbol='501018', period='daily', start_date='20260101', end_date='20260302')
print('原油数据条数:', len(df))
print(df.tail(3))
"

      - name: List files for debugging
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in root:"
          ls -la
          echo "Files in docs (if exists):"
          ls -la docs || echo "docs folder not found"

      - name: Run momentum script
        run: python momentum.py

      - name: Commit and push if changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/index.html docs/signals.csv events_config.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update signal and events"
            git push
          fi
