name: Run Momentum Strategy
on:
  schedule:
    - cron: '30 6 * * *'   # 每天北京时间 14:30
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install pandas numpy baostock
      - name: Run momentum script
        run: python momentum.py
      - name: Commit and push if changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/index.html docs/signals.csv events_config.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update signal and events"
            git push
          fi
